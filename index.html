<title>S Capital Daily</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: #000; color: #e0e0e0; font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; padding-bottom: 40px; }

  /* Header */
  .header {
    background: #3a3a3c;
    padding: 32px 20px 24px;
    text-align: center;
  }
  .header img {
    height: 48px;
    width: auto;
    margin-bottom: 12px;
  }
  .header-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #1DA1D4, transparent);
    width: 200px;
    margin: 0 auto 12px;
  }
  .header-label {
    font-size: 13px;
    color: #aaa;
    letter-spacing: 6px;
    font-weight: 500;
  }
  .header-date {
    font-size: 12px;
    color: #777;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* Container */
  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* Streak tile */
  .streak-tile {
    background: linear-gradient(180deg, #0e0e0e 0%, #050505 100%);
    border: 1px solid #1e1e2a;
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .streak-tile::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, #1DA1D466, transparent);
  }
  .streak-label {
    font-size: 11px;
    color: #888;
    letter-spacing: 4px;
    margin-bottom: 8px;
    font-weight: 500;
  }
  .streak-value {
    font-size: 44px;
    font-weight: 700;
    color: #1DA1D4;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .streak-unit {
    font-size: 12px;
    color: #666;
    letter-spacing: 2px;
  }

  /* Section */
  .section {
    background: #0e0e0e;
    border: 1px solid #1e1e2a;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title.morning { color: #1DA1D4; }
  .section-title.eod { color: #16A34A; }
  .section-title.donot { color: #FF4757; }

  /* Checklist items */
  .item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 10px;
    background: #050505;
    border: 1px solid #161620;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s ease;
  }
  .item:active {
    transform: scale(0.99);
  }
  .item:last-child { margin-bottom: 0; }
  .item.checked {
    background: #0a1410;
    border-color: #16A34A33;
  }
  .item.checked .item-text {
    color: #5a8a6a;
    text-decoration: line-through;
    text-decoration-color: #16A34A55;
  }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid #2a2a35;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    margin-top: 1px;
  }
  .item.checked .checkbox {
    background: #16A34A;
    border-color: #16A34A;
  }
  .checkbox::after {
    content: "";
    display: block;
    width: 6px;
    height: 11px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg) scale(0);
    transition: transform 0.15s ease;
    margin-bottom: 2px;
  }
  .item.checked .checkbox::after {
    transform: rotate(45deg) scale(1);
  }

  .item-time {
    font-size: 11px;
    color: #666;
    letter-spacing: 1px;
    margin-bottom: 3px;
    font-weight: 500;
  }
  .item-text {
    font-size: 14px;
    color: #d8d8d8;
    line-height: 1.4;
    transition: color 0.2s ease;
  }
  .item-content {
    flex: 1;
  }

  /* DO NOT items - different styling, no checkboxes */
  .donot-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 10px;
    background: #15080a;
    border: 1px solid #FF475722;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  .donot-item:last-child { margin-bottom: 0; }
  .donot-icon {
    color: #FF4757;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .donot-text {
    font-size: 13px;
    color: #d8a0a8;
    line-height: 1.45;
    flex: 1;
  }

  /* Quote */
  .quote-box {
    margin-top: 24px;
    padding: 22px 20px;
    text-align: center;
    border-top: 1px solid #1e1e2a;
    border-bottom: 1px solid #1e1e2a;
    background: linear-gradient(180deg, transparent, #0a0a0a 50%, transparent);
  }
  .quote-mark {
    color: #1DA1D444;
    font-size: 32px;
    line-height: 0.5;
    font-family: Georgia, serif;
    margin-bottom: 8px;
  }
  .quote-text {
    font-size: 14px;
    color: #b8b8b8;
    line-height: 1.6;
    font-style: italic;
    margin-bottom: 10px;
    padding: 0 10px;
  }
  .quote-author {
    font-size: 11px;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Reset button */
  .reset-row {
    text-align: center;
    margin-top: 20px;
  }
  .reset-btn {
    background: #0e0e0e;
    color: #555;
    border: 1px solid #1e1e2a;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: inherit;
  }
  .reset-btn:active { background: #1a1a1a; }

  /* Completion celebration */
  .complete-banner {
    background: linear-gradient(90deg, #0a1410, #0e0e0e, #0a1410);
    border: 1px solid #16A34A55;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    margin-bottom: 16px;
    color: #16A34A;
    font-size: 13px;
    letter-spacing: 2px;
    font-weight: 600;
  }
</style>
</head>

  // ----- Date helpers -----
  function todayKey() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return y + "-" + m + "-" + day;
  }

  function formatToday() {
    const d = new Date();
    const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    const months = ["January", "February", "March", "April", "May", "June",
                    "July", "August", "September", "October", "November", "December"];
    return days[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate() + ", " + d.getFullYear();
  }

  function dayOfYear() {
    const d = new Date();
    const start = new Date(d.getFullYear(), 0, 0);
    const diff = d - start;
    return Math.floor(diff / 86400000);
  }

  // ----- Storage -----
  const STORAGE_KEY = "scapital_daily_v1";

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { byDate: {}, streakCount: 0, lastCompletedDate: null };
      const parsed = JSON.parse(raw);
      return {
        byDate: parsed.byDate || {},
        streakCount: parsed.streakCount || 0,
        lastCompletedDate: parsed.lastCompletedDate || null,
      };
    } catch (e) {
      return { byDate: {}, streakCount: 0, lastCompletedDate: null };
    }
  }

  function saveState(state) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {}
  }

  function getTodayChecked() {
    const state = loadState();
    return state.byDate[todayKey()] || {};
  }

  function setItemChecked(itemId, checked) {
    const state = loadState();
    const key = todayKey();
    if (!state.byDate[key]) state.byDate[key] = {};
    if (checked) state.byDate[key][itemId] = true;
    else delete state.byDate[key][itemId];

    // Check if all required items now complete
    updateStreakIfNeeded(state);
    saveState(state);
    render();
  }

  function isAllRequiredChecked(checkedMap) {
    // Streak counts when all morning + EOD items are checked
    const required = MORNING_ITEMS.concat(EOD_ITEMS).map(i => i.id);
    return required.every(id => checkedMap[id]);
  }

  function updateStreakIfNeeded(state) {
    const key = todayKey();
    const todayChecked = state.byDate[key] || {};
    const allDone = isAllRequiredChecked(todayChecked);

    if (allDone && state.lastCompletedDate !== key) {
      // Mark today as completed
      const yesterdayKey = (function() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, "0");
        const day = String(d.getDate()).padStart(2, "0");
        return y + "-" + m + "-" + day;
      })();

      if (state.lastCompletedDate === yesterdayKey) {
        // Continuing streak
        state.streakCount = (state.streakCount || 0) + 1;
      } else {
        // New streak (or restart)
        state.streakCount = 1;
      }
      state.lastCompletedDate = key;
    }
  }

  function resetToday() {
    if (!confirm("Clear all checks for today? Streak count is preserved.")) return;
    const state = loadState();
    delete state.byDate[todayKey()];
    if (state.lastCompletedDate === todayKey()) {
      // If today was already credited, we need to undo it
      state.streakCount = Math.max(0, (state.streakCount || 1) - 1);
      state.lastCompletedDate = null;
    }
    saveState(state);
    render();
  }

  // ----- Render -----
  function render() {
    document.getElementById("today-date").textContent = formatToday();

    const state = loadState();
    const checked = getTodayChecked();
    const allDone = isAllRequiredChecked(checked);

    // Streak
    document.getElementById("streak-count").textContent = state.streakCount || 0;
    document.getElementById("streak-unit").textContent =
      (state.streakCount === 1) ? "DAY" : "DAYS";

    // Banner
    const banner = document.getElementById("complete-banner");
    if (allDone) {
      banner.className = "complete-banner";
      banner.innerHTML = "✓ DAY COMPLETE — STREAK SECURED";
    } else {
      banner.className = "";
      banner.innerHTML = "";
    }

    // Morning items
    renderItemList("morning-items", MORNING_ITEMS, checked);
    renderItemList("eod-items", EOD_ITEMS, checked);

    // DO NOT
    const donotEl = document.getElementById("donot-items");
    donotEl.innerHTML = "";
    DONOT_ITEMS.forEach(text => {
      const div = document.createElement("div");
      div.className = "donot-item";
      const icon = document.createElement("span");
      icon.className = "donot-icon";
      icon.textContent = "✕";
      const txt = document.createElement("div");
      txt.className = "donot-text";
      txt.textContent = text;
      div.appendChild(icon);
      div.appendChild(txt);
      donotEl.appendChild(div);
    });

    // Quote (rotates daily by day-of-year)
    const q = QUOTES[dayOfYear() % QUOTES.length];
    document.getElementById("quote-text").textContent = q.t;
    document.getElementById("quote-author").textContent = q.a;
  }

  function renderItemList(containerId, items, checked) {
    const el = document.getElementById(containerId);
    el.innerHTML = "";
    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "item" + (checked[item.id] ? " checked" : "");
      div.addEventListener("click", () => {
        setItemChecked(item.id, !checked[item.id]);
      });

      const cb = document.createElement("div");
      cb.className = "checkbox";

      const content = document.createElement("div");
      content.className = "item-content";

      const time = document.createElement("div");
      time.className = "item-time";
      time.textContent = item.time;

      const text = document.createElement("div");
      text.className = "item-text";
      text.textContent = item.text;

      content.appendChild(time);
      content.appendChild(text);

      div.appendChild(cb);
      div.appendChild(content);

      el.appendChild(div);
    });
  }

  // ----- Init -----
  document.getElementById("reset-btn").addEventListener("click", resetToday);
  render();

  // Re-render at midnight (in case the page is left open across days)
  setInterval(() => {
    const lastDate = document.getElementById("today-date").dataset.key;
    if (lastDate !== todayKey()) {
      render();
    }
    document.getElementById("today-date").dataset.key = todayKey();
  }, 60000);
})();
</script>
